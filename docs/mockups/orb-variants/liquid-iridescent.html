<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tacticl // Command — Liquid Iridescent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --violet:#6C63FF;
    --magenta:#B25CFF;
    --cyan:#15E0C8;
    --cyan2:#03DAC6;
    --white:#ffffff;
    --bg0:#06060f;
    --bg1:#0c0b1a;
    --orb: clamp(320px, 42vmin, 460px);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:"JetBrains Mono", monospace;
    background:
      radial-gradient(120% 90% at 18% 8%,  rgba(108,99,255,.16) 0%, transparent 45%),
      radial-gradient(110% 85% at 88% 10%, rgba(21,224,200,.10) 0%, transparent 48%),
      radial-gradient(130% 95% at 50% 108%, rgba(178,92,255,.12) 0%, transparent 52%),
      linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 100%);
    color:#e6e6f2;
    min-height:100%;
    overflow:hidden;
    position:relative;
  }

  /* ---------- BACKDROP LAYERS ---------- */

  /* faint grid, masked to fade at edges */
  .grid{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(to right, rgba(150,150,210,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(150,150,210,.05) 1px, transparent 1px);
    background-size:34px 34px;
    -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 35%, transparent 82%);
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 35%, transparent 82%);
  }

  /* slow vertical scanline sweep */
  .scan{
    position:fixed; left:0; right:0; height:42vh; z-index:1; pointer-events:none;
    background:linear-gradient(to bottom,
       transparent 0%,
       rgba(108,99,255,.05) 45%,
       rgba(21,224,200,.07) 50%,
       rgba(108,99,255,.05) 55%,
       transparent 100%);
    mix-blend-mode:screen;
    animation:scanSweep 9s linear infinite;
  }
  @keyframes scanSweep{
    0%{ transform:translateY(-60vh); opacity:0; }
    12%{ opacity:1; }
    88%{ opacity:1; }
    100%{ transform:translateY(120vh); opacity:0; }
  }

  /* ---------- BRAND + STATE CHROME ---------- */

  .brand{
    position:fixed; top:26px; left:30px; z-index:6;
    font-family:"Chakra Petch", sans-serif;
    font-weight:600; letter-spacing:.28em; font-size:13px;
    text-transform:uppercase; color:#c9c9e8;
  }
  .brand .slash{ color:var(--violet); }

  .stage{
    position:fixed; inset:0; z-index:4;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:clamp(34px, 6vmin, 64px);
  }

  .statewrap{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    margin-top:clamp(10px, 4vmin, 38px);
  }
  .state-label{
    font-family:"Chakra Petch", sans-serif;
    font-weight:600; letter-spacing:.42em; font-size:13px;
    text-transform:uppercase;
    color:#dfe7ff;
    text-shadow:0 0 14px rgba(108,99,255,.55);
  }
  .dots{ display:flex; gap:14px; align-items:center; }
  .dots .dot{
    width:7px; height:7px; border-radius:50%;
    background:rgba(180,180,220,.22);
    transition:all .3s ease;
  }
  .dots .dot.on{
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan), 0 0 20px rgba(21,224,200,.6);
    animation:dotPulse 1.6s ease-in-out infinite;
  }
  @keyframes dotPulse{
    0%,100%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(1.5); opacity:.65; }
  }
  .dots .tag{
    margin-left:6px;
    font-size:9.5px; letter-spacing:.22em; text-transform:uppercase;
    color:rgba(190,190,220,.4);
  }

  /* ---------- ORB ---------- */

  .orb-zone{
    position:relative;
    width:var(--orb); height:var(--orb);
    display:flex; align-items:center; justify-content:center;
  }

  /* outer bloom halo (soft, behind everything) */
  .bloom{
    position:absolute; inset:-32%;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(108,99,255,.30) 0%,
        rgba(178,92,255,.18) 32%,
        rgba(21,224,200,.10) 52%,
        transparent 70%);
    filter:blur(26px);
    animation:bloomBreath 7s ease-in-out infinite;
    z-index:0;
  }
  @keyframes bloomBreath{
    0%,100%{ transform:scale(1); opacity:.85; }
    50%{ transform:scale(1.08); opacity:1; }
  }

  /* shadow / contact glow under the orb (depth anchor) */
  .ground{
    position:absolute; bottom:-9%; left:50%;
    width:64%; height:13%;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at center, rgba(108,99,255,.40), transparent 70%);
    filter:blur(16px);
    z-index:0;
    animation:groundBreath 7s ease-in-out infinite;
  }
  @keyframes groundBreath{
    0%,100%{ opacity:.5; transform:translateX(-50%) scaleX(1); }
    50%{ opacity:.8; transform:translateX(-50%) scaleX(1.06); }
  }

  /* the physical sphere — gentle breathing + parallax bob */
  .sphere{
    position:relative;
    width:100%; height:100%;
    border-radius:50%;
    z-index:2;
    animation:sphereBob 8s ease-in-out infinite;
    /* dark refractive body base shading */
    background:
      radial-gradient(circle at 36% 30%,
        rgba(60,58,110,.55) 0%,
        rgba(22,20,46,.92) 38%,
        #07060f 72%,
        #040309 100%);
    box-shadow:
      inset -22px -26px 60px rgba(0,0,0,.85),
      inset 14px 16px 50px rgba(120,110,220,.20),
      0 30px 70px rgba(0,0,0,.6);
    overflow:hidden;
    isolation:isolate;
  }
  @keyframes sphereBob{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-10px) scale(1.012); }
  }

  /* shared full-cover layer helper */
  .layer{ position:absolute; inset:0; border-radius:50%; }

  /* ROTATING oil-slick conic sheen (violet→magenta→cyan→gold) */
  .oilslick{
    background:conic-gradient(from 0deg at 50% 50%,
       #6C63FF 0deg,
       #B25CFF 58deg,
       #ff7ad0 104deg,
       #15E0C8 168deg,
       #03DAC6 214deg,
       #ffd27a 280deg,
       #9a7bff 330deg,
       #6C63FF 360deg);
    mix-blend-mode:color-dodge;
    opacity:.42;
    filter:saturate(1.5) blur(2px);
    /* wrap the flat conic onto a sphere: squeeze toward edges */
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 56%, rgba(0,0,0,.35) 78%, transparent 96%);
            mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 56%, rgba(0,0,0,.35) 78%, transparent 96%);
    animation:slickSpin 18s linear infinite;
  }
  @keyframes slickSpin{
    0%{   transform:rotate(0deg)   scale(1.18); }
    100%{ transform:rotate(360deg) scale(1.18); }
  }

  /* second counter-rotating slick band for shimmering interference */
  .oilslick2{
    background:conic-gradient(from 120deg at 46% 54%,
       transparent 0deg,
       rgba(178,92,255,.9) 50deg,
       transparent 120deg,
       rgba(21,224,200,.9) 200deg,
       transparent 270deg,
       rgba(255,210,122,.8) 320deg,
       transparent 360deg);
    mix-blend-mode:screen;
    opacity:.30;
    filter:blur(6px) saturate(1.4);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 50%, transparent 88%);
            mask-image: radial-gradient(circle at 50% 50%, #000 0%, #000 50%, transparent 88%);
    animation:slickSpin2 26s linear infinite;
  }
  @keyframes slickSpin2{
    0%{   transform:rotate(360deg) scale(1.1); }
    100%{ transform:rotate(0deg)   scale(1.1); }
  }

  /* subsurface ripple / caustics that drift under the sheen */
  .caustics{
    background:
      radial-gradient(circle at 30% 70%, rgba(21,224,200,.20), transparent 26%),
      radial-gradient(circle at 70% 40%, rgba(108,99,255,.20), transparent 30%),
      radial-gradient(circle at 55% 78%, rgba(178,92,255,.18), transparent 28%),
      radial-gradient(circle at 22% 36%, rgba(255,210,122,.10), transparent 22%);
    mix-blend-mode:screen;
    opacity:.7;
    filter:blur(4px);
    -webkit-mask-image: radial-gradient(circle at 44% 40%, #000 0%, #000 60%, transparent 92%);
            mask-image: radial-gradient(circle at 44% 40%, #000 0%, #000 60%, transparent 92%);
    animation:causticsDrift 14s ease-in-out infinite alternate;
  }
  @keyframes causticsDrift{
    0%{   transform:translate(-3%, 2%) scale(1.0)  rotate(0deg); }
    50%{  transform:translate(4%, -3%) scale(1.06) rotate(8deg); }
    100%{ transform:translate(-2%, 4%) scale(1.02) rotate(-6deg); }
  }

  /* dark mercury body shading on top to keep it metallic & deep */
  .bodyshade{
    background:
      radial-gradient(circle at 38% 32%,
        transparent 0%,
        transparent 40%,
        rgba(4,3,10,.35) 70%,
        rgba(2,1,6,.85) 100%);
    z-index:3;
    pointer-events:none;
  }

  /* FRESNEL rim light — bright glassy edge */
  .fresnel{
    background:radial-gradient(circle at 50% 50%,
      transparent 0%,
      transparent 70%,
      rgba(120,110,230,.0) 78%,
      rgba(160,150,255,.55) 90%,
      rgba(21,224,200,.65) 96%,
      rgba(255,255,255,.85) 99.5%,
      transparent 100%);
    mix-blend-mode:screen;
    z-index:5;
    pointer-events:none;
    animation:fresnelShift 9s ease-in-out infinite;
  }
  @keyframes fresnelShift{
    0%,100%{ opacity:.85; filter:hue-rotate(0deg); }
    50%{ opacity:1; filter:hue-rotate(28deg); }
  }

  /* razor-sharp moving SPECULAR highlight (the glint) */
  .specular{
    position:absolute;
    width:30%; height:30%;
    border-radius:50%;
    top:16%; left:24%;
    background:radial-gradient(circle at 38% 35%,
       rgba(255,255,255,1) 0%,
       rgba(255,255,255,.95) 8%,
       rgba(220,225,255,.55) 22%,
       rgba(180,190,255,.0) 60%);
    filter:blur(.4px) drop-shadow(0 0 8px rgba(255,255,255,.7));
    mix-blend-mode:screen;
    z-index:6;
    pointer-events:none;
    animation:specGlide 8s ease-in-out infinite;
  }
  @keyframes specGlide{
    0%,100%{ transform:translate(0,0) scale(1);   opacity:1; }
    35%{    transform:translate(18%, 8%) scale(.82); opacity:.9; }
    50%{    transform:translate(26%, 20%) scale(.7); opacity:.75; }
    70%{    transform:translate(10%, 14%) scale(.9); opacity:.95; }
  }

  /* small secondary soft sheen / ambient occlusion lift */
  .softsheen{
    position:absolute;
    width:58%; height:42%;
    top:8%; left:18%;
    border-radius:50%;
    background:radial-gradient(ellipse at 40% 30%,
       rgba(200,205,255,.30) 0%,
       rgba(160,170,255,.10) 40%,
       transparent 72%);
    filter:blur(6px);
    mix-blend-mode:screen;
    z-index:4;
    pointer-events:none;
    animation:sheenBreath 8s ease-in-out infinite;
  }
  @keyframes sheenBreath{
    0%,100%{ opacity:.7; }
    50%{ opacity:1; }
  }

  /* tiny floating mote sparks orbiting the orb for life */
  .mote{
    position:absolute; top:50%; left:50%;
    width:3px; height:3px; border-radius:50%;
    background:#fff; z-index:5;
    box-shadow:0 0 6px var(--cyan);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="grid"></div>
  <div class="scan"></div>

  <div class="brand">TACTICL <span class="slash">//</span> COMMAND</div>

  <div class="stage">
    <div class="orb-zone" id="orbZone">
      <div class="bloom"></div>
      <div class="ground"></div>

      <div class="sphere">
        <div class="layer caustics"></div>
        <div class="layer oilslick2"></div>
        <div class="layer oilslick"></div>
        <div class="layer bodyshade"></div>
        <div class="softsheen"></div>
        <div class="specular"></div>
        <div class="layer fresnel"></div>
      </div>
    </div>

    <div class="statewrap">
      <div class="state-label">LISTENING</div>
      <div class="dots">
        <span class="dot on"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="tag">listening · thinking · speaking · idle</span>
      </div>
    </div>
  </div>

<script>
  // --- orbiting mote sparks (pure vanilla, no libs) ---
  (function(){
    const zone = document.getElementById('orbZone');
    const N = 5;
    const motes = [];
    for(let i=0;i<N;i++){
      const m = document.createElement('div');
      m.className = 'mote';
      zone.appendChild(m);
      motes.push({
        el:m,
        a: Math.random()*Math.PI*2,
        r: 0.52 + Math.random()*0.12,   // radius as fraction of half-orb
        spd: (0.0016 + Math.random()*0.0022) * (Math.random()<.5?1:-1),
        tilt: 0.55 + Math.random()*0.35,
        hue: Math.random()<.5 ? '#15E0C8' : '#B25CFF'
      });
    }
    function tick(){
      const w = zone.clientWidth, h = zone.clientHeight;
      for(const m of motes){
        m.a += m.spd;
        const x = Math.cos(m.a) * (w*0.5) * m.r;
        const y = Math.sin(m.a) * (h*0.5) * m.r * m.tilt;
        // depth: dim + shrink when "behind" the orb (sin<0 region)
        const depth = (Math.sin(m.a)+1)/2;       // 0..1
        const sc = 0.5 + depth*1.0;
        const op = 0.15 + depth*0.85;
        m.el.style.transform =
          `translate(-50%,-50%) translate(${x}px, ${y}px) scale(${sc})`;
        m.el.style.opacity = op.toFixed(2);
        m.el.style.background = m.hue;
        m.el.style.boxShadow = `0 0 6px ${m.hue}, 0 0 12px ${m.hue}`;
      }
      requestAnimationFrame(tick);
    }
    tick();
  })();

  // --- subtle pointer parallax on the whole orb zone ---
  (function(){
    const zone = document.getElementById('orbZone');
    const sphere = zone.querySelector('.sphere');
    const spec = zone.querySelector('.specular');
    window.addEventListener('pointermove', (e)=>{
      const cx = window.innerWidth/2, cy = window.innerHeight/2;
      const dx = (e.clientX - cx) / cx;   // -1..1
      const dy = (e.clientY - cy) / cy;
      zone.style.transform = `translate(${dx*10}px, ${dy*8}px)`;
      // nudge the glint slightly opposite for parallax realism
      spec.style.marginLeft = `${-dx*10}px`;
      spec.style.marginTop  = `${-dy*8}px`;
    }, {passive:true});
  })();
</script>
</body>
</html>
