<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tacticl // Command — Cosmic Nebula</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     TACTICL // COMMAND  —  Hero Orb · "Cosmic Nebula"
     A swirling galaxy sealed in glass. Pure CSS/SVG, no libs.
     ============================================================ */

  :root {
    --violet:   #6C63FF;
    --magenta:  #B25CFF;
    --cyan:     #15E0C8;
    --cyan-2:   #03DAC6;
    --hotwhite: #ffffff;
    --bg0:      #06060f;
    --bg1:      #0c0b1a;

    --orb: clamp(320px, 42vmin, 460px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: "Chakra Petch", system-ui, sans-serif;
    background: var(--bg0);
    color: #e8e6ff;
    overflow: hidden;
    min-height: 100vh;
  }

  /* ============================================================
     COCKPIT BACKDROP
     ============================================================ */
  .cockpit {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    isolation: isolate;
    background:
      radial-gradient(120% 90% at 50% 120%, var(--bg1) 0%, var(--bg0) 70%),
      linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
  }

  /* layered radial brand glows */
  .cockpit::before {
    content: "";
    position: absolute;
    inset: -20%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(40% 38% at 18% 14%,  rgba(108,99,255,.16) 0%, transparent 60%),
      radial-gradient(38% 34% at 84% 12%,  rgba(21,224,200,.10) 0%, transparent 60%),
      radial-gradient(52% 48% at 50% 104%, rgba(178,92,255,.12) 0%, transparent 62%);
    filter: saturate(1.05);
  }

  /* faint grid overlay, masked to fade at the edges */
  .grid {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(140,140,200,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,140,200,.055) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 32%, transparent 78%);
            mask-image: radial-gradient(circle at 50% 50%, #000 32%, transparent 78%);
    opacity: .9;
  }

  /* slow vertical scanline sweep */
  .scanline {
    position: absolute;
    left: 0; right: 0;
    height: 38vh;
    z-index: 0;
    pointer-events: none;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(108,99,255,.05) 42%,
      rgba(21,224,200,.07) 50%,
      rgba(108,99,255,.05) 58%,
      transparent 100%);
    mix-blend-mode: screen;
    animation: sweep 9s linear infinite;
  }
  @keyframes sweep {
    0%   { transform: translateY(-60vh); }
    100% { transform: translateY(160vh); }
  }

  /* fine ambient starfield over the whole cockpit (not the orb's own field) */
  .ambient-stars {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 76% 18%, rgba(178,228,255,.6), transparent),
      radial-gradient(1px 1px at 28% 78%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 64% 66%, rgba(200,180,255,.6), transparent),
      radial-gradient(1px 1px at 90% 44%, rgba(255,255,255,.45), transparent),
      radial-gradient(1px 1px at 44% 40%, rgba(160,255,235,.5), transparent),
      radial-gradient(1.5px 1.5px at 8% 60%, rgba(255,255,255,.4), transparent);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 28%, #000 70%);
            mask-image: radial-gradient(circle at 50% 50%, transparent 28%, #000 70%);
    animation: twinkleAmbient 6s ease-in-out infinite alternate;
  }
  @keyframes twinkleAmbient { from { opacity:.35 } to { opacity:.85 } }

  /* ============================================================
     BRAND  &  STATE LABEL  (kept minimal)
     ============================================================ */
  .brand {
    position: absolute;
    top: clamp(18px, 3vmin, 34px);
    left: clamp(18px, 3vmin, 34px);
    z-index: 5;
    font-weight: 600;
    font-size: clamp(11px, 1.4vmin, 14px);
    letter-spacing: .28em;
    text-transform: uppercase;
    color: #cfcbf5;
    text-shadow: 0 0 14px rgba(108,99,255,.4);
  }
  .brand .slash { color: var(--violet); }

  .stage {
    position: relative;
    z-index: 4;
    display: grid;
    place-items: center;
    gap: clamp(26px, 4vmin, 46px);
  }

  .state {
    display: grid;
    place-items: center;
    gap: 14px;
    transform: translateY(2px);
  }
  .state-label {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: clamp(11px, 1.35vmin, 13px);
    letter-spacing: .42em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(21,224,200,.5);
    padding-left: .42em;
    animation: labelPulse 2.6s ease-in-out infinite;
  }
  @keyframes labelPulse { 0%,100%{opacity:.7} 50%{opacity:1} }

  .dots { display: flex; gap: 12px; }
  .dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(160,160,210,.25);
    transition: background .3s;
  }
  .dots span.on {
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan), 0 0 18px rgba(21,224,200,.6);
    animation: dotBreathe 1.6s ease-in-out infinite;
  }
  @keyframes dotBreathe { 0%,100%{transform:scale(1);opacity:.8} 50%{transform:scale(1.35);opacity:1} }

  /* ============================================================
     THE ORB
     ============================================================ */
  .orb-wrap {
    position: relative;
    width: var(--orb);
    height: var(--orb);
    display: grid;
    place-items: center;
    animation: orbFloat 11s ease-in-out infinite;
  }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0) }
    50%     { transform: translateY(-14px) }
  }

  /* soft cosmic outer BLOOM halo */
  .orb-bloom {
    position: absolute;
    width: 168%; height: 168%;
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(108,99,255,.34) 0%, rgba(178,92,255,.18) 34%, rgba(21,224,200,.10) 54%, transparent 72%);
    filter: blur(34px);
    mix-blend-mode: screen;
    animation: bloomPulse 6.5s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes bloomPulse {
    0%,100% { transform: scale(1);    opacity:.85 }
    50%     { transform: scale(1.08); opacity:1   }
  }

  /* the sealed glass sphere — clips everything cosmic inside */
  .sphere {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 50%, #0a0820 0%, #060512 64%, #03030a 100%);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,.9),
      inset 0 0 26px rgba(108,99,255,.28),
      0 30px 80px rgba(0,0,0,.6),
      0 0 60px rgba(108,99,255,.28);
    z-index: 1;
  }

  /* nebula gas clouds — multiple stacked radial gradients, drifting */
  .nebula {
    position: absolute;
    inset: -14%;
    border-radius: 50%;
    mix-blend-mode: screen;
    background:
      radial-gradient(34% 30% at 38% 40%, rgba(178,92,255,.55) 0%, transparent 60%),
      radial-gradient(30% 28% at 64% 58%, rgba(21,224,200,.45) 0%, transparent 62%),
      radial-gradient(40% 36% at 56% 36%, rgba(108,99,255,.50) 0%, transparent 64%),
      radial-gradient(26% 24% at 34% 66%, rgba(3,218,198,.40) 0%, transparent 60%),
      radial-gradient(22% 20% at 70% 30%, rgba(178,92,255,.40) 0%, transparent 58%);
    filter: blur(6px) saturate(1.25);
    animation: nebulaDrift 26s ease-in-out infinite alternate;
  }
  @keyframes nebulaDrift {
    0%   { transform: rotate(0deg)   scale(1.02); }
    50%  { transform: rotate(8deg)   scale(1.08); }
    100% { transform: rotate(-6deg)  scale(1.04); }
  }

  /* the swirling SPIRAL galaxy — conic + radial, slow rotation */
  .galaxy {
    position: absolute;
    inset: -8%;
    border-radius: 50%;
    mix-blend-mode: screen;
    background:
      conic-gradient(from 0deg at 50% 50%,
        rgba(108,99,255,.00) 0deg,
        rgba(108,99,255,.55) 38deg,
        rgba(178,92,255,.32) 84deg,
        rgba(21,224,200,.00) 150deg,
        rgba(21,224,200,.50) 210deg,
        rgba(3,218,198,.30) 262deg,
        rgba(108,99,255,.00) 320deg,
        rgba(108,99,255,.00) 360deg);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 8%, rgba(0,0,0,.85) 30%, transparent 74%);
            mask-image: radial-gradient(circle at 50% 50%, #000 8%, rgba(0,0,0,.85) 30%, transparent 74%);
    filter: blur(3px);
    animation: spin 38s linear infinite;
  }
  /* second arm set, counter-weighted + offset for a true double-spiral */
  .galaxy.arm2 {
    inset: 2%;
    background:
      conic-gradient(from 180deg at 50% 50%,
        rgba(178,92,255,.00) 0deg,
        rgba(178,92,255,.50) 44deg,
        rgba(108,99,255,.28) 96deg,
        rgba(21,224,200,.00) 160deg,
        rgba(21,224,200,.46) 220deg,
        rgba(178,92,255,.00) 300deg,
        rgba(178,92,255,.00) 360deg);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 6%, rgba(0,0,0,.8) 26%, transparent 66%);
            mask-image: radial-gradient(circle at 50% 50%, #000 6%, rgba(0,0,0,.8) 26%, transparent 66%);
    filter: blur(5px);
    opacity: .85;
    animation: spin 52s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* drifting dust band — soft swirl that counter-rotates slowly */
  .dust {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    mix-blend-mode: screen;
    background:
      conic-gradient(from 90deg at 50% 50%,
        transparent 0deg,
        rgba(255,255,255,.10) 30deg,
        transparent 80deg,
        rgba(178,92,255,.14) 160deg,
        transparent 220deg,
        rgba(21,224,200,.12) 300deg,
        transparent 360deg);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 18%, #000 36%, transparent 70%);
            mask-image: radial-gradient(circle at 50% 50%, transparent 18%, #000 36%, transparent 70%);
    filter: blur(4px);
    animation: spinRev 70s linear infinite;
  }
  @keyframes spinRev { to { transform: rotate(-360deg); } }

  /* twinkling STAR PARTICLE field — SVG, generated by JS */
  .starfield {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 2;
    mix-blend-mode: screen;
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 64%, transparent 88%);
            mask-image: radial-gradient(circle at 50% 50%, #000 64%, transparent 88%);
  }
  .starfield .twk { animation: twk var(--d,3s) ease-in-out infinite alternate; }
  @keyframes twk { from { opacity:.2 } to { opacity:1 } }
  .starfield.slow-spin { animation: spin 120s linear infinite; }

  /* brilliant galactic CORE */
  .core {
    position: absolute;
    width: 30%; height: 30%;
    border-radius: 50%;
    z-index: 2;
    background:
      radial-gradient(circle, #ffffff 0%, #eafcff 14%, var(--cyan) 30%, var(--violet) 52%, rgba(108,99,255,.0) 72%);
    box-shadow:
      0 0 40px rgba(255,255,255,.85),
      0 0 70px rgba(21,224,200,.7),
      0 0 110px rgba(108,99,255,.6);
    filter: blur(.4px);
    animation: coreBeat 4.2s ease-in-out infinite;
  }
  @keyframes coreBeat {
    0%,100% { transform: scale(1);    opacity:.95 }
    50%     { transform: scale(1.14); opacity:1   }
  }
  /* tiny ultra-bright core seed */
  .core-seed {
    position: absolute;
    width: 8%; height: 8%;
    border-radius: 50%;
    z-index: 3;
    background: radial-gradient(circle, #fff 0%, #eafcff 50%, rgba(255,255,255,0) 78%);
    box-shadow: 0 0 24px #fff, 0 0 46px rgba(234,252,255,.9);
    animation: coreBeat 2.8s ease-in-out infinite;
  }

  /* CAUSTIC refraction — soft warped light inside the glass */
  .caustic {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 3;
    mix-blend-mode: overlay;
    background:
      radial-gradient(60% 50% at 36% 30%, rgba(255,255,255,.10) 0%, transparent 55%),
      radial-gradient(46% 40% at 70% 72%, rgba(108,99,255,.10) 0%, transparent 60%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 60%, transparent 86%);
            mask-image: radial-gradient(circle at 50% 50%, #000 60%, transparent 86%);
    animation: causticDrift 14s ease-in-out infinite alternate;
  }
  @keyframes causticDrift {
    from { transform: translate(-2%, -1%) rotate(-3deg); }
    to   { transform: translate( 2%,  2%) rotate( 4deg); }
  }

  /* ---- GLASS SHELL on top of the sealed contents ---- */

  /* FRESNEL rim light — bright thin edge all around */
  .fresnel {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 4;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%, transparent 60%, rgba(108,99,255,.0) 78%, rgba(178,92,255,.55) 92%, rgba(21,224,200,.35) 97%, transparent 100%);
    box-shadow:
      inset 0 0 2px rgba(255,255,255,.5),
      inset 0 0 22px rgba(108,99,255,.45);
    mix-blend-mode: screen;
  }

  /* glassy curved top highlight (the "sheen" of the sphere) */
  .glass-sheen {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 5;
    pointer-events: none;
    background:
      radial-gradient(58% 42% at 38% 24%, rgba(255,255,255,.30) 0%, rgba(255,255,255,.08) 36%, transparent 60%),
      radial-gradient(40% 30% at 64% 80%, rgba(108,99,255,.14) 0%, transparent 60%);
    mix-blend-mode: screen;
  }

  /* bright off-center SPECULAR glint */
  .specular {
    position: absolute;
    top: 17%; left: 26%;
    width: 20%; height: 14%;
    border-radius: 50%;
    z-index: 6;
    background: radial-gradient(circle at 40% 40%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.4) 38%, transparent 70%);
    filter: blur(2px);
    transform: rotate(-22deg);
    animation: glintShimmer 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glintShimmer {
    0%,100% { opacity:.7;  transform: rotate(-22deg) scale(1);    }
    50%     { opacity:1;   transform: rotate(-22deg) scale(1.08); }
  }
  /* tiny secondary specular dot */
  .specular.mini {
    top: 70%; left: 66%;
    width: 7%; height: 7%;
    opacity: .6;
    animation-delay: 1.4s;
  }

  /* refraction caustic arc near bottom rim */
  .rim-caustic {
    position: absolute;
    inset: 4%;
    border-radius: 50%;
    z-index: 5;
    pointer-events: none;
    background: conic-gradient(from 200deg at 50% 50%,
      transparent 0deg,
      rgba(21,224,200,.45) 18deg,
      rgba(255,255,255,.5) 30deg,
      rgba(178,92,255,.4) 42deg,
      transparent 64deg,
      transparent 360deg);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, transparent 78%, #000 90%, transparent 100%);
            mask-image: radial-gradient(circle at 50% 50%, transparent 78%, #000 90%, transparent 100%);
    mix-blend-mode: screen;
    filter: blur(1px);
    opacity: .8;
  }

  /* faint reduced-motion fallback */
  @media (prefers-reduced-motion: reduce) {
    .scanline, .orb-wrap, .orb-bloom, .nebula, .galaxy, .dust,
    .core, .core-seed, .caustic, .specular, .state-label, .ambient-stars,
    .starfield.slow-spin, .dots span.on {
      animation: none !important;
    }
  }
</style>
</head>
<body>
  <main class="cockpit">
    <div class="grid"></div>
    <div class="ambient-stars"></div>
    <div class="scanline"></div>

    <div class="brand">TACTICL <span class="slash">//</span> COMMAND</div>

    <section class="stage">
      <div class="orb-wrap">
        <div class="orb-bloom"></div>

        <div class="sphere">
          <div class="nebula"></div>
          <div class="galaxy"></div>
          <div class="galaxy arm2"></div>
          <div class="dust"></div>

          <svg class="starfield slow-spin" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
            <g id="stars"></g>
          </svg>

          <div class="core"></div>
          <div class="core-seed"></div>
          <div class="caustic"></div>

          <div class="fresnel"></div>
          <div class="rim-caustic"></div>
          <div class="glass-sheen"></div>
          <div class="specular"></div>
          <div class="specular mini"></div>
        </div>
      </div>

      <div class="state">
        <div class="state-label">LISTENING</div>
        <div class="dots" id="dots">
          <span class="on"></span><span></span><span></span><span></span>
        </div>
      </div>
    </section>
  </main>

  <script>
    /* ---- generate the twinkling star-particle field inside the orb ---- */
    (function buildStars () {
      const g = document.getElementById("stars");
      if (!g) return;
      const NS = "http://www.w3.org/2000/svg";
      const COLORS = ["#ffffff", "#eafcff", "#b25cff", "#15e0c8", "#6c63ff", "#cdeaff"];
      const N = 140;
      for (let i = 0; i < N; i++) {
        // bias stars toward the disc — denser near center, sparse at rim
        const ang = Math.random() * Math.PI * 2;
        const r   = Math.pow(Math.random(), 0.62) * 46;     // radial falloff
        const cx  = 50 + Math.cos(ang) * r;
        const cy  = 50 + Math.sin(ang) * r * 0.9;           // slight ellipse → galactic disc
        const rad = Math.random() * 0.55 + 0.12;
        const c   = document.createElementNS(NS, "circle");
        c.setAttribute("cx", cx.toFixed(2));
        c.setAttribute("cy", cy.toFixed(2));
        c.setAttribute("r",  rad.toFixed(2));
        c.setAttribute("fill", COLORS[(Math.random() * COLORS.length) | 0]);
        c.setAttribute("class", "twk");
        c.style.setProperty("--d", (Math.random() * 4 + 1.6).toFixed(2) + "s");
        c.style.animationDelay = (-Math.random() * 4).toFixed(2) + "s";
        // a handful of brighter "hero" stars get a glow
        if (Math.random() > 0.9) {
          c.setAttribute("r", (rad + 0.35).toFixed(2));
          c.style.filter = "drop-shadow(0 0 1.4px #fff)";
        }
        g.appendChild(c);
      }
    })();

    /* ---- cosmetic state cycle on the 4-dot strip (listening→thinking→speaking→idle) ---- */
    (function cycleState () {
      const states  = ["LISTENING", "THINKING", "SPEAKING", "IDLE"];
      const label   = document.querySelector(".state-label");
      const dots    = Array.from(document.querySelectorAll("#dots span"));
      if (!label || dots.length !== 4) return;
      if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      let i = 0;
      setInterval(() => {
        i = (i + 1) % states.length;
        label.textContent = states[i];
        dots.forEach((d, k) => d.classList.toggle("on", k === i));
      }, 3200);
    })();
  </script>
</body>
</html>
