<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TACTICL // COMMAND — Data Sphere+ (Living Heart)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --violet:#6C63FF;
    --magenta:#B25CFF;
    --cyan:#15E0C8;
    --cyan2:#03DAC6;
    --white:#ffffff;
    --bg0:#06060f;
    --bg1:#0c0b1a;
    --orb: clamp(320px, 42vmin, 460px);

    /* ---- state-reactive control knobs (transitioned on .orb) ---- */
    --accent: var(--violet);        /* primary accent that shifts to magenta on think */
    --bloom-scale: 1;               /* base bloom size multiplier */
    --bloom-opacity: .9;            /* base bloom strength */
    --core-bright: .85;             /* nucleus brightness */
    --core-scale: 1;                /* nucleus expansion */
    --node-speed: 1;                /* multiplier feel for node/arc pace (drives anim via class swaps) */
    --spin-speed: 1;                /* globe spin feel */
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    font-family:'Chakra Petch', system-ui, sans-serif;
    background:
      radial-gradient(1200px 760px at 18% 8%,  rgba(108,99,255,.16), transparent 60%),
      radial-gradient(1100px 720px at 86% 12%, rgba(21,224,200,.10), transparent 58%),
      radial-gradient(1300px 900px at 50% 112%, rgba(178,92,255,.12), transparent 60%),
      linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 60%, #08060f 100%);
    color:#dfe2ff;
    min-height:100vh;
    overflow:hidden;
    position:relative;
    display:grid;
    place-items:center;
  }

  /* faint grid overlay, masked to fade at edges */
  .grid-overlay{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(124,116,255,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,116,255,.055) 1px, transparent 1px);
    background-size:34px 34px;
    -webkit-mask-image: radial-gradient(ellipse 78% 70% at 50% 48%, #000 35%, transparent 88%);
            mask-image: radial-gradient(ellipse 78% 70% at 50% 48%, #000 35%, transparent 88%);
    opacity:.6;
  }

  /* slow vertical scanline sweep across the whole cockpit */
  .scan-sweep{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(to bottom,
      transparent 0%,
      rgba(124,116,255,.05) 46%,
      rgba(21,224,200,.07) 50%,
      rgba(124,116,255,.05) 54%,
      transparent 100%);
    height:46%;
    animation:sweep 9s linear infinite;
    mix-blend-mode:screen;
  }
  @keyframes sweep{
    0%   { transform:translateY(-120%); }
    100% { transform:translateY(320%); }
  }

  /* vignette */
  body::after{
    content:""; position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(ellipse 90% 90% at 50% 50%, transparent 55%, rgba(2,2,8,.62) 100%);
  }

  /* brand mark */
  .brand{
    position:fixed; top:26px; left:30px; z-index:6;
    font-family:'Chakra Petch', sans-serif;
    font-weight:600; letter-spacing:.32em; font-size:13px;
    text-transform:uppercase; color:#b9bdf0;
    text-shadow:0 0 16px rgba(108,99,255,.35);
  }
  .brand .slash{ color:var(--violet); }
  .brand .sub{
    display:block; margin-top:5px; font-family:'JetBrains Mono', monospace;
    font-weight:400; letter-spacing:.28em; font-size:9.5px; color:#5a5f8a;
  }

  /* tiny HUD coordinates top-right */
  .hud-coords{
    position:fixed; top:28px; right:30px; z-index:6;
    font-family:'JetBrains Mono', monospace; font-size:9.5px;
    letter-spacing:.16em; color:#4d527e; text-align:right; line-height:1.7;
  }
  .hud-coords b{ color:var(--cyan); font-weight:500; }

  /* ---------------- STAGE ---------------- */
  .stage{
    position:relative; z-index:3;
    width:var(--orb); height:var(--orb);
    display:grid; place-items:center;
    perspective:1100px;
  }

  /* ============================================================
     OUTER BLOOM HALO  (transplanted + strengthened from plasma-core:
     soft, large, violet body with a cyan edge; now state-reactive
     via --bloom-scale / --bloom-opacity / --accent)
     ============================================================ */
  .bloom{
    position:absolute; inset:-34%;
    border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(178,92,255,.46) 0%,
        rgba(108,99,255,.34) 26%,
        rgba(21,224,200,.16) 52%,
        transparent 72%),
      radial-gradient(circle at 42% 38%, rgba(108,99,255,.30), transparent 56%),
      radial-gradient(circle at 64% 66%, rgba(21,224,200,.22), transparent 58%);
    filter:blur(46px);
    opacity:var(--bloom-opacity);
    transform:scale(var(--bloom-scale));
    animation:bloomPulse 6.5s ease-in-out infinite;
    mix-blend-mode:screen;
    pointer-events:none;
    transition:opacity .9s ease, transform .9s ease, filter .9s ease;
  }
  @keyframes bloomPulse{
    0%,100%{ opacity:calc(var(--bloom-opacity) * .92); transform:scale(calc(var(--bloom-scale) * .98)); }
    50%    { opacity:var(--bloom-opacity);              transform:scale(calc(var(--bloom-scale) * 1.05)); }
  }

  /* secondary cyan corona ring riding just outside the silhouette
     (the "cyan edge" of the bloom) — donor flavor, slow spin */
  .corona{
    position:absolute; inset:-14%;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%,
      transparent 50%,
      rgba(21,224,200,.24) 61%,
      rgba(21,224,200,.06) 73%,
      transparent 82%);
    filter:blur(9px);
    mix-blend-mode:screen;
    opacity:calc(var(--bloom-opacity) * .9);
    animation:coronaSpin 26s linear infinite;
    pointer-events:none;
    transition:opacity .9s ease;
  }
  @keyframes coronaSpin{ to{ transform:rotate(360deg); } }

  /* the rotating 3D rig */
  .orb{
    position:relative; width:100%; height:100%;
    border-radius:50%;
    transform-style:preserve-3d;
    isolation:isolate;
    /* every reactive knob eases when the state class flips */
    transition:filter 1s ease;
  }

  /* glass core sphere — depth gradients + fresnel + specular */
  .core{
    position:absolute; inset:7%;
    border-radius:50%;
    background:
      radial-gradient(circle at 36% 30%, rgba(160,170,255,.30), rgba(70,64,170,.10) 38%, transparent 60%),
      radial-gradient(circle at 50% 50%, rgba(20,16,48,.55), rgba(8,6,24,.86) 72%),
      conic-gradient(from 210deg at 50% 50%,
        rgba(108,99,255,.20), rgba(21,224,200,.16), rgba(178,92,255,.18), rgba(108,99,255,.20));
    box-shadow:
      inset 0 0 60px rgba(8,6,26,.9),
      inset -16px -20px 70px rgba(2,2,10,.85),
      inset 14px 16px 60px rgba(124,116,255,.18),
      0 0 80px rgba(108,99,255,.35),
      0 0 140px rgba(21,224,200,.16);
    overflow:hidden;
  }
  /* fresnel rim light */
  .core::before{
    content:""; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 50% 50%, transparent 60%, rgba(124,116,255,.0) 70%, rgba(124,160,255,.55) 92%, rgba(21,224,200,.35) 100%);
    mix-blend-mode:screen;
  }
  /* off-center bright specular glint */
  .core::after{
    content:""; position:absolute;
    width:34%; height:24%; left:24%; top:16%;
    border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.85), rgba(190,210,255,.35) 36%, transparent 70%);
    filter:blur(5px);
    mix-blend-mode:screen;
    animation:glintDrift 7s ease-in-out infinite;
  }
  @keyframes glintDrift{
    0%,100%{ transform:translate(0,0) scale(1); opacity:.9; }
    50%    { transform:translate(8px,6px) scale(1.08); opacity:1; }
  }

  /* ============================================================
     BREATHING WHITE-HOT NUCLEUS  (transplanted from plasma-core)
     Sits INSIDE the glass interior (inset 7% like .core), BEHIND the
     wireframe globe (.globe-wrap z=3) but IN FRONT of the deep .core
     gradient — z=2 + screen blend so the meridians/nodes read over it.
     ~violet → white, soft pulse = the sphere's visible heartbeat.
     State-reactive via --core-bright / --core-scale / --accent.
     ============================================================ */
  .nucleus{
    position:absolute;
    width:52%; height:52%; left:24%; top:24%;
    border-radius:50%;
    background:radial-gradient(circle at 50% 48%,
      #ffffff 0%,
      #ffffff 13%,
      rgba(255,238,255,.95) 23%,
      rgba(196,160,255,.82) 42%,
      rgba(140,90,255,.42) 60%,
      transparent 76%);
    filter:blur(4px);
    mix-blend-mode:screen;
    box-shadow:0 0 64px rgba(255,255,255,.5);
    opacity:var(--core-bright);
    transform:scale(var(--core-scale));
    animation:nucleusBreath 4.2s ease-in-out infinite;
    z-index:2;
    pointer-events:none;
    transition:opacity 1s ease, transform 1s ease, filter 1s ease;
  }
  @keyframes nucleusBreath{
    0%,100% { transform:scale(calc(var(--core-scale) * .9));  opacity:calc(var(--core-bright) * .92); filter:blur(4px); }
    45%     { transform:scale(calc(var(--core-scale) * 1.12)); opacity:var(--core-bright);             filter:blur(2px); }
    60%     { transform:scale(calc(var(--core-scale) * 1.03)); opacity:var(--core-bright); }
  }

  /* inner hot ring flickering around the nucleus (donor 'hotring'),
     also behind the wireframe, screen-blended */
  .hotring{
    position:absolute;
    width:66%; height:66%; left:17%; top:17%;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%,
      transparent 54%,
      rgba(216,178,255,.34) 64%,
      rgba(178,92,255,.0) 75%);
    filter:blur(6px);
    mix-blend-mode:screen;
    opacity:calc(var(--core-bright) * .85);
    animation:hotFlicker 3.3s ease-in-out infinite;
    z-index:2;
    pointer-events:none;
    transition:opacity 1s ease;
  }
  @keyframes hotFlicker{
    0%,100% { opacity:calc(var(--core-bright) * .58); transform:scale(1); }
    33%     { opacity:calc(var(--core-bright) * .9);  transform:scale(1.04) rotate(4deg); }
    66%     { opacity:calc(var(--core-bright) * .66); transform:scale(.98) rotate(-3deg); }
  }

  /* holographic scanline shimmer clipped to the sphere */
  .holo-scan{
    position:absolute; inset:7%; border-radius:50%; overflow:hidden;
    pointer-events:none; mix-blend-mode:screen; z-index:4;
  }
  .holo-scan::before{
    content:""; position:absolute; left:-10%; right:-10%; height:200%;
    top:-50%;
    background:repeating-linear-gradient(
      to bottom,
      transparent 0px,
      rgba(21,224,200,.0) 5px,
      rgba(124,160,255,.10) 6px,
      rgba(21,224,200,.16) 7px,
      transparent 8px,
      transparent 13px);
    animation:holoScroll 5s linear infinite;
    opacity:.7;
  }
  .holo-scan::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(115deg, transparent 38%, rgba(180,210,255,.16) 50%, transparent 62%);
    animation:holoShimmer 4.2s ease-in-out infinite;
  }
  @keyframes holoScroll{ 0%{ transform:translateY(0); } 100%{ transform:translateY(13px); } }
  @keyframes holoShimmer{ 0%,100%{ transform:translateX(-30%); opacity:.4; } 50%{ transform:translateX(30%); opacity:.9; } }

  /* the SVG wireframe globe — spins */
  .globe-wrap{
    position:absolute; inset:7%;
    transform-style:preserve-3d;
    animation:spinGlobe 26s linear infinite;
    z-index:3;
  }
  @keyframes spinGlobe{
    0%   { transform:rotateZ(0deg); }
    100% { transform:rotateZ(360deg); }
  }
  .globe-wrap svg{ width:100%; height:100%; overflow:visible; display:block; }

  /* traveling data nodes pulse */
  .node{ transform-box:fill-box; transform-origin:center; }

  /* ---- orbiting rings rig (separate, in front, 3D tilts) ---- */
  .rings{
    position:absolute; inset:-4%;
    transform-style:preserve-3d;
    z-index:6;
    pointer-events:none;
  }
  .ring{
    position:absolute; inset:0; border-radius:50%;
    border:1.4px solid rgba(124,160,255,.32);
    box-shadow:0 0 18px rgba(108,99,255,.25), inset 0 0 22px rgba(108,99,255,.10);
    transform-style:preserve-3d;
  }
  .ring.r1{
    transform:rotateX(74deg) rotateZ(0deg);
    border-color:rgba(108,99,255,.42);
    animation:ringSpin1 11s linear infinite;
  }
  .ring.r2{
    inset:6%;
    transform:rotateX(60deg) rotateY(38deg);
    border-color:rgba(21,224,200,.40);
    box-shadow:0 0 18px rgba(21,224,200,.28), inset 0 0 22px rgba(21,224,200,.10);
    animation:ringSpin2 8.5s linear infinite;
  }
  .ring.r3{
    inset:-3%;
    transform:rotateX(112deg) rotateY(-26deg);
    border-color:rgba(178,92,255,.40);
    box-shadow:0 0 18px rgba(178,92,255,.26), inset 0 0 22px rgba(178,92,255,.10);
    animation:ringSpin3 14s linear infinite;
  }
  @keyframes ringSpin1{ from{ transform:rotateX(74deg) rotateZ(0); } to{ transform:rotateX(74deg) rotateZ(360deg); } }
  @keyframes ringSpin2{ from{ transform:rotateX(60deg) rotateY(38deg) rotateZ(0); } to{ transform:rotateX(60deg) rotateY(38deg) rotateZ(360deg); } }
  @keyframes ringSpin3{ from{ transform:rotateX(112deg) rotateY(-26deg) rotateZ(0); } to{ transform:rotateX(112deg) rotateY(-26deg) rotateZ(-360deg); } }

  /* comet node travels along each ring (positioned at ring edge, orbits via parent spin) */
  .comet{
    position:absolute; top:50%; left:50%;
    width:14px; height:14px; margin:-7px 0 0 -7px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 40%, #fff, var(--cyan) 45%, transparent 72%);
    box-shadow:0 0 14px 3px rgba(21,224,200,.85), 0 0 30px 8px rgba(21,224,200,.45);
  }
  .comet::after{ /* trail */
    content:""; position:absolute; top:50%; left:50%;
    width:64px; height:5px; margin-top:-2.5px;
    transform-origin:left center; transform:translateX(0) rotate(0deg);
    background:linear-gradient(to right, rgba(21,224,200,.9), rgba(21,224,200,0));
    filter:blur(1.5px); border-radius:3px;
  }
  .r1 .comet{ left:100%; background:radial-gradient(circle at 40% 40%, #fff, var(--violet) 45%, transparent 72%); box-shadow:0 0 14px 3px rgba(108,99,255,.85),0 0 30px 8px rgba(108,99,255,.45); }
  .r1 .comet::after{ background:linear-gradient(to right, rgba(108,99,255,.9), rgba(108,99,255,0)); transform:translateX(-64px) rotate(180deg); }
  .r2 .comet{ left:100%; }
  .r2 .comet::after{ transform:translateX(-64px) rotate(180deg); }
  .r3 .comet{ left:0%; background:radial-gradient(circle at 40% 40%, #fff, var(--magenta) 45%, transparent 72%); box-shadow:0 0 14px 3px rgba(178,92,255,.85),0 0 30px 8px rgba(178,92,255,.45); }
  .r3 .comet::after{ background:linear-gradient(to right, rgba(178,92,255,.9), rgba(178,92,255,0)); }

  /* cardinal HUD ticks around orb */
  .hud-ring{
    position:absolute; inset:-10%; z-index:5; pointer-events:none;
    animation:hudCounter 60s linear infinite;
  }
  @keyframes hudCounter{ from{ transform:rotate(0); } to{ transform:rotate(-360deg); } }
  .hud-ring svg{ width:100%; height:100%; overflow:visible; }

  /* depth fog overlay in front (lower hemisphere darkens) */
  .depth-fog{
    position:absolute; inset:0; border-radius:50%; z-index:5;
    pointer-events:none;
    background:radial-gradient(ellipse 120% 90% at 50% 118%, rgba(4,3,12,.6), transparent 52%);
    mix-blend-mode:multiply;
  }

  /* ============================================================
     STATE-REACTIVE BEHAVIOUR
     JS toggles .state-listening / .state-thinking / .state-speaking
     / .state-idle on the .orb root. CSS reacts: retunes the knob
     custom-props (eased by the transitions above) AND retimes the
     animation-durations of the live elements (nodes/arcs/rings/spin)
     for a felt speed change. Defaults below = LISTENING.
     ============================================================ */

  /* --- LISTENING (default): steady violet, calm pulse, medium bloom --- */
  .orb.state-listening{
    --accent: var(--violet);
    --bloom-scale: 1;
    --bloom-opacity: .9;
    --core-bright: .85;
    --core-scale: 1;
  }

  /* --- THINKING: accents toward MAGENTA, faster nodes/arcs, core brightens --- */
  .orb.state-thinking{
    --accent: var(--magenta);
    --bloom-scale: 1.04;
    --bloom-opacity: .96;
    --core-bright: 1;
    --core-scale: 1.06;
  }
  /* speed the wireframe processing arcs + traveling packets */
  .orb.state-thinking .arc{ animation-duration:1.3s; }
  .orb.state-thinking .packet{ animation-duration:2.4s; }
  /* tint the meridians/parallels toward magenta */
  .orb.state-thinking .wire-stroke{ stroke:#caa0ff; }
  /* node pulse quickens */
  .orb.state-thinking .node-pulse{ animation-duration:1.4s; }

  /* --- SPEAKING: brighten + EXPAND bloom, faster comets, core hottest/whitest --- */
  .orb.state-speaking{
    --accent: var(--cyan);
    --bloom-scale: 1.16;
    --bloom-opacity: 1;
    --core-bright: 1;
    --core-scale: 1.16;
  }
  .orb.state-speaking .nucleus{
    /* hottest, whitest center */
    background:radial-gradient(circle at 50% 48%,
      #ffffff 0%,
      #ffffff 20%,
      rgba(235,245,255,.98) 32%,
      rgba(150,210,255,.7) 52%,
      rgba(21,224,200,.32) 66%,
      transparent 80%);
  }
  .orb.state-speaking .arc{ animation-duration:1.8s; }
  .orb.state-speaking .packet{ animation-duration:3s; }
  .orb.state-speaking .node-pulse{ animation-duration:1.9s; }

  /* --- IDLE: dim/calm, slow rotation, smaller bloom --- */
  .orb.state-idle{
    --accent: var(--violet);
    --bloom-scale: .84;
    --bloom-opacity: .58;
    --core-bright: .5;
    --core-scale: .9;
  }
  .orb.state-idle .arc{ animation-duration:5.2s; }
  .orb.state-idle .packet{ animation-duration:7s; }
  .orb.state-idle .node-pulse{ animation-duration:4.6s; }
  .orb.state-idle .globe-wrap{ animation-duration:46s; }
  .orb.state-idle .holo-scan{ opacity:.4; }

  /* spin retime hooks that need to live on the spinning child */
  .orb.state-thinking .globe-wrap{ animation-duration:18s; }
  .orb.state-speaking .globe-wrap{ animation-duration:20s; }
  .orb.state-thinking .ring,
  .orb.state-thinking .ring.r1{ animation-duration:8.5s; }
  .orb.state-speaking .ring.r1{ animation-duration:6.5s; }
  .orb.state-speaking .ring.r2{ animation-duration:5.5s; }
  .orb.state-speaking .ring.r3{ animation-duration:9s; }
  .orb.state-idle .ring.r1{ animation-duration:16s; }
  .orb.state-idle .ring.r2{ animation-duration:14s; }
  .orb.state-idle .ring.r3{ animation-duration:20s; }

  /* the rings live as a sibling of .orb in markup; mirror the state
     class onto the .stage so we can reach them. We instead let JS put
     the state class on .stage too (see script) — these target that. */
  .stage.state-thinking .ring.r1{ animation-duration:8.5s; }
  .stage.state-thinking .ring.r2{ animation-duration:6.8s; }
  .stage.state-thinking .ring.r3{ animation-duration:11s; }
  .stage.state-speaking .ring.r1{ animation-duration:6.5s; }
  .stage.state-speaking .ring.r2{ animation-duration:5.5s; }
  .stage.state-speaking .ring.r3{ animation-duration:9s; }
  .stage.state-idle .ring.r1{ animation-duration:16s; }
  .stage.state-idle .ring.r2{ animation-duration:14s; }
  .stage.state-idle .ring.r3{ animation-duration:20s; }
  /* bloom + corona are siblings of .orb under .stage — react via .stage class */
  .stage.state-thinking .bloom{ --bloom-scale:1.04; --bloom-opacity:.96; }
  .stage.state-speaking .bloom{ --bloom-scale:1.16; --bloom-opacity:1; }
  .stage.state-idle .bloom{ --bloom-scale:.84; --bloom-opacity:.58; }
  .stage.state-thinking .corona{ opacity:.9; }
  .stage.state-speaking .corona{ opacity:1; }
  .stage.state-idle .corona{ opacity:.4; }

  /* ---------------- STATE LABEL ---------------- */
  .state{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(50% - (var(--orb) / 2) - 78px);
    z-index:6; text-align:center;
  }
  .state .label{
    font-family:'JetBrains Mono', monospace; font-weight:500;
    letter-spacing:.42em; font-size:12px; text-transform:uppercase;
    color:var(--cyan);
    text-shadow:0 0 18px rgba(21,224,200,.55);
    padding-left:.42em;
    transition:color .5s ease, text-shadow .5s ease;
  }
  .dots{ display:flex; gap:9px; justify-content:center; margin-top:14px; }
  .dots .d{
    width:7px; height:7px; border-radius:50%;
    background:#2a2c48; position:relative;
    transition:background .3s;
  }
  .dots .d.on{
    background:var(--cyan);
    box-shadow:0 0 10px 1px rgba(21,224,200,.8);
    animation:dotPulse 1.4s ease-in-out infinite;
  }
  @keyframes dotPulse{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  .dots .meta{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace; font-size:7.5px;
    letter-spacing:.12em; color:#42466e; white-space:nowrap;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="scan-sweep"></div>

  <div class="brand">
    TACTICL <span class="slash">//</span> COMMAND
    <span class="sub">HOLOGRAPHIC DATA-SPHERE · LIVING HEART · v2</span>
  </div>

  <div class="hud-coords">
    LAT <b>+42.36°</b> · LON <b>-71.05°</b><br />
    NODES <b>128</b> · LINK <b>STABLE</b><br />
    SYNC <b id="sync">0.00%</b>
  </div>

  <div class="stage">
    <!-- strengthened bloom halo (sibling of .orb, reacts via .stage state class) -->
    <div class="bloom"></div>
    <div class="corona"></div>

    <!-- cardinal HUD ticks -->
    <div class="hud-ring">
      <svg viewBox="0 0 400 400" aria-hidden="true">
        <g stroke="rgba(124,160,255,.5)" stroke-width="1.4" fill="none">
          <!-- 4 cardinal long ticks -->
          <line x1="200" y1="6"   x2="200" y2="26" stroke="rgba(21,224,200,.8)"/>
          <line x1="200" y1="374" x2="200" y2="394" stroke="rgba(21,224,200,.8)"/>
          <line x1="6"   y1="200" x2="26"  y2="200" stroke="rgba(178,92,255,.8)"/>
          <line x1="374" y1="200" x2="394" y2="200" stroke="rgba(178,92,255,.8)"/>
        </g>
        <g stroke="rgba(124,160,255,.28)" stroke-width="1">
          <!-- minor ticks every 15deg -->
          <line x1="200" y1="8"  x2="200" y2="18"/>
          <line x1="296" y1="22" x2="291" y2="32"/>
          <line x1="378" y1="104" x2="368" y2="109"/>
          <line x1="392" y1="200" x2="382" y2="200"/>
          <line x1="378" y1="296" x2="368" y2="291"/>
          <line x1="296" y1="378" x2="291" y2="368"/>
          <line x1="200" y1="392" x2="200" y2="382"/>
          <line x1="104" y1="378" x2="109" y2="368"/>
          <line x1="22"  y1="296" x2="32"  y2="291"/>
          <line x1="8"   y1="200" x2="18"  y2="200"/>
          <line x1="22"  y1="104" x2="32"  y2="109"/>
          <line x1="104" y1="22"  x2="109" y2="32"/>
        </g>
        <g font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(124,160,255,.55)" letter-spacing="1">
          <text x="200" y="44" text-anchor="middle">N</text>
          <text x="362" y="204" text-anchor="middle">E</text>
          <text x="200" y="364" text-anchor="middle">S</text>
          <text x="40"  y="204" text-anchor="middle">W</text>
        </g>
      </svg>
    </div>

    <div class="orb state-listening">
      <div class="core"></div>

      <!-- LIVING HEART: white-hot nucleus + flickering hot ring,
           BEHIND the wireframe globe, IN FRONT of the deep .core -->
      <div class="hotring"></div>
      <div class="nucleus"></div>

      <!-- SVG wireframe globe -->
      <div class="globe-wrap">
        <svg viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <radialGradient id="globeFade" cx="42%" cy="38%" r="72%">
              <stop offset="0%"  stop-color="#aab4ff" stop-opacity=".9"/>
              <stop offset="55%" stop-color="#6c8bff" stop-opacity=".55"/>
              <stop offset="100%" stop-color="#3a3f8a" stop-opacity=".18"/>
            </radialGradient>
            <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#15E0C8"/>
              <stop offset="100%" stop-color="#6C63FF"/>
            </linearGradient>
            <linearGradient id="arcGrad2" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#B25CFF"/>
              <stop offset="100%" stop-color="#15E0C8"/>
            </linearGradient>
            <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="0.8"/>
            </filter>
            <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="40%" stop-color="#15E0C8"/>
              <stop offset="100%" stop-color="#15E0C8" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="nodeGlowV" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="40%" stop-color="#8a86ff"/>
              <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- outer sphere outline -->
          <circle cx="100" cy="100" r="92" fill="none" stroke="url(#globeFade)" stroke-width="1.1" opacity=".85"/>
          <circle cx="100" cy="100" r="92" fill="none" stroke="#15E0C8" stroke-width="0.5" opacity=".25"/>

          <!-- parallels (latitude ellipses) -->
          <g class="wire-stroke" fill="none" stroke="url(#globeFade)" stroke-width="0.7" opacity=".6">
            <ellipse cx="100" cy="40"  rx="55" ry="9"/>
            <ellipse cx="100" cy="64"  rx="78" ry="14"/>
            <ellipse cx="100" cy="100" rx="92" ry="19"/>
            <ellipse cx="100" cy="136" rx="78" ry="14"/>
            <ellipse cx="100" cy="160" rx="55" ry="9"/>
          </g>

          <!-- meridians (longitude ellipses, vertical) — animate rx to fake rotation -->
          <g class="wire-stroke" fill="none" stroke="url(#globeFade)" stroke-width="0.7" opacity=".55">
            <ellipse cx="100" cy="100" rx="92" ry="92"/>
            <ellipse cx="100" cy="100" rx="70" ry="92">
              <animate attributeName="rx" values="70;92;70;28;70" dur="13s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values=".55;.7;.55;.3;.55" dur="13s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="100" cy="100" rx="40" ry="92">
              <animate attributeName="rx" values="40;72;92;72;40" dur="13s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="100" cy="100" rx="14" ry="92">
              <animate attributeName="rx" values="14;48;78;48;14" dur="13s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values=".5;.65;.45;.65;.5" dur="13s" repeatCount="indefinite"/>
            </ellipse>
          </g>

          <!-- glowing data arcs that pulse (processing) -->
          <g fill="none" stroke-width="1.3" opacity=".9">
            <path class="arc" d="M55,58 Q100,20 148,72" stroke="url(#arcGrad)" stroke-linecap="round"
                  stroke-dasharray="6 140" stroke-dashoffset="0">
              <animate attributeName="stroke-dashoffset" values="0;-146" dur="2.6s" repeatCount="indefinite"/>
            </path>
            <path class="arc" d="M40,120 Q100,170 160,118" stroke="url(#arcGrad2)" stroke-linecap="round"
                  stroke-dasharray="5 150" stroke-dashoffset="0">
              <animate attributeName="stroke-dashoffset" values="0;-155" dur="3.1s" repeatCount="indefinite"/>
            </path>
            <path class="arc" d="M70,150 Q120,95 142,52" stroke="url(#arcGrad)" stroke-linecap="round"
                  stroke-dasharray="5 120" stroke-dashoffset="0">
              <animate attributeName="stroke-dashoffset" values="0;-125" dur="2.2s" repeatCount="indefinite"/>
            </path>
            <path class="arc" d="M58,90 Q150,80 150,140" stroke="url(#arcGrad2)" stroke-linecap="round"
                  stroke-dasharray="4 130" stroke-dashoffset="0">
              <animate attributeName="stroke-dashoffset" values="0;-134" dur="3.6s" repeatCount="indefinite"/>
            </path>
          </g>

          <!-- static faint connection lattice -->
          <g stroke="#6C63FF" stroke-width="0.45" opacity=".35">
            <line x1="55" y1="58" x2="148" y2="72"/>
            <line x1="40" y1="120" x2="160" y2="118"/>
            <line x1="70" y1="150" x2="142" y2="52"/>
            <line x1="58" y1="90" x2="150" y2="140"/>
            <line x1="100" y1="35" x2="100" y2="165"/>
          </g>

          <!-- luminous data nodes (pulsing) -->
          <g>
            <circle class="node node-pulse" cx="55"  cy="58"  r="5" fill="url(#nodeGlow)">
              <animate attributeName="r" values="3;6;3" dur="2.4s" repeatCount="indefinite"/>
            </circle>
            <circle cx="55" cy="58" r="1.6" fill="#fff"/>

            <circle class="node node-pulse" cx="148" cy="72" r="5" fill="url(#nodeGlowV)">
              <animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite" begin="-0.6s"/>
            </circle>
            <circle cx="148" cy="72" r="1.6" fill="#fff"/>

            <circle class="node node-pulse" cx="40" cy="120" r="5" fill="url(#nodeGlow)">
              <animate attributeName="r" values="3;5.5;3" dur="2.8s" repeatCount="indefinite" begin="-1.1s"/>
            </circle>
            <circle cx="40" cy="120" r="1.4" fill="#fff"/>

            <circle class="node node-pulse" cx="160" cy="118" r="5" fill="url(#nodeGlowV)">
              <animate attributeName="r" values="3;6;3" dur="2.5s" repeatCount="indefinite" begin="-1.6s"/>
            </circle>
            <circle cx="160" cy="118" r="1.6" fill="#fff"/>

            <circle class="node node-pulse" cx="70" cy="150" r="4.5" fill="url(#nodeGlow)">
              <animate attributeName="r" values="2.5;5;2.5" dur="3.3s" repeatCount="indefinite" begin="-0.3s"/>
            </circle>
            <circle cx="70" cy="150" r="1.4" fill="#fff"/>

            <circle class="node node-pulse" cx="142" cy="52" r="4.5" fill="url(#nodeGlowV)">
              <animate attributeName="r" values="2.5;5.5;2.5" dur="2.7s" repeatCount="indefinite" begin="-2s"/>
            </circle>
            <circle cx="142" cy="52" r="1.4" fill="#fff"/>

            <circle class="node node-pulse" cx="100" cy="35" r="4" fill="url(#nodeGlow)">
              <animate attributeName="r" values="2.5;5;2.5" dur="3.4s" repeatCount="indefinite" begin="-1.4s"/>
            </circle>
            <circle cx="100" cy="35" r="1.3" fill="#fff"/>

            <circle class="node node-pulse" cx="100" cy="165" r="4" fill="url(#nodeGlowV)">
              <animate attributeName="r" values="2.5;5;2.5" dur="2.9s" repeatCount="indefinite" begin="-0.9s"/>
            </circle>
            <circle cx="100" cy="165" r="1.3" fill="#fff"/>
          </g>

          <!-- traveling pulse packets along a meridian path -->
          <circle class="packet" r="2.6" fill="#fff">
            <animateMotion dur="4s" repeatCount="indefinite" path="M100,35 Q150,100 100,165 Q50,100 100,35"/>
          </circle>
          <circle class="packet" r="2" fill="#15E0C8">
            <animateMotion dur="5.2s" repeatCount="indefinite" begin="-1.5s" path="M40,120 Q100,170 160,118 Q100,60 40,120"/>
          </circle>
        </svg>
      </div>

      <!-- holographic scanline shimmer over sphere -->
      <div class="holo-scan"></div>
      <div class="depth-fog"></div>
    </div>

    <!-- orbiting elliptical rings with comet nodes -->
    <div class="rings">
      <div class="ring r1"><span class="comet"></span></div>
      <div class="ring r2"><span class="comet"></span></div>
      <div class="ring r3"><span class="comet"></span></div>
    </div>
  </div>

  <!-- state label + listening strip -->
  <div class="state">
    <div class="label">LISTENING</div>
    <div class="dots">
      <span class="d on" data-s="listening"></span>
      <span class="d" data-s="thinking"></span>
      <span class="d" data-s="speaking"></span>
      <span class="d" data-s="idle"></span>
      <span class="meta" id="statemeta">LISTENING</span>
    </div>
  </div>

  <script>
    // gentle sync readout for the HUD
    (function(){
      var el = document.getElementById('sync');
      var v = 0;
      setInterval(function(){
        v += (Math.random()*1.7 - 0.3);
        if (v > 99.9) v = 92 + Math.random()*3;
        if (v < 88)  v = 88 + Math.random()*4;
        el.textContent = v.toFixed(2) + '%';
      }, 700);
    })();

    // cycle the 4-state strip (listening → thinking → speaking → idle)
    // AND drive the orb's reactivity by toggling a state-* class on both
    // the .orb root (heart/bloom/wire) and the .stage (rings/bloom siblings).
    (function(){
      var states = ['listening','thinking','speaking','idle'];
      var labels = { listening:'LISTENING', thinking:'THINKING', speaking:'SPEAKING', idle:'IDLE' };
      var dots  = Array.prototype.slice.call(document.querySelectorAll('.dots .d'));
      var label = document.querySelector('.state .label');
      var meta  = document.getElementById('statemeta');
      var orb   = document.querySelector('.orb');
      var stage = document.querySelector('.stage');
      var i = 0;

      function applyState(name){
        states.forEach(function(s){
          orb.classList.remove('state-' + s);
          stage.classList.remove('state-' + s);
        });
        orb.classList.add('state-' + name);
        stage.classList.add('state-' + name);
      }

      function tick(){
        var name = states[i];
        dots.forEach(function(d){ d.classList.toggle('on', d.dataset.s === name); });
        label.textContent = labels[name];
        meta.textContent  = labels[name];
        applyState(name);
        i = (i + 1) % states.length;
      }

      tick();                 // set initial LISTENING immediately
      setInterval(tick, 2600); // cycle ~every 2.6s so reactivity is visible
    })();

    // gentle pointer parallax: the sphere leans toward the cursor
    (function(){
      var orb = document.querySelector('.orb');
      if (!orb) return;
      var tx = 0, ty = 0, cx = 0, cy = 0;
      window.addEventListener('pointermove', function(e){
        tx = (e.clientX / window.innerWidth  - 0.5) * 16;
        ty = (e.clientY / window.innerHeight - 0.5) * 16;
      });
      function frame(){
        cx += (tx - cx) * 0.06;
        cy += (ty - cy) * 0.06;
        orb.style.transform =
          'translate(' + cx.toFixed(2) + 'px,' + cy.toFixed(2) + 'px) ' +
          'rotateX(' + (-cy * 0.45).toFixed(2) + 'deg) ' +
          'rotateY(' + (cx * 0.45).toFixed(2) + 'deg)';
        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>
</body>
</html>
